/* =========================================================
   POCKET FRIENDLY — AUTO SAVE / AUTO LOAD (localStorage)
   Drop this near the end of your existing script.js,
   or link it as a separate <script> AFTER your main script
   and AFTER your HTML form elements exist in the DOM.
   ========================================================= */

(function () {
  const STORAGE_KEY = "pocketFriendlyData";

  /* ---------------------------------------------------
     1. Helper: get a stable key for a field
     Uses id first, falls back to name, skips fields
     that have neither (can't reliably restore those).
  --------------------------------------------------- */
  function getFieldKey(el) {
    return el.id || el.name || null;
  }

  /* ---------------------------------------------------
     2. Collect all trackable fields on the page
  --------------------------------------------------- */
  function getAllFields() {
    return Array.from(document.querySelectorAll("input, select, textarea"))
      .filter((el) => getFieldKey(el) !== null)
      // don't try to persist the reset button, file inputs, etc.
      .filter((el) => el.type !== "button" && el.type !== "submit" && el.type !== "file" && el.type !== "reset");
  }

  /* ---------------------------------------------------
     3. SAVE: read current DOM values into a JSON object
        and write to localStorage
  --------------------------------------------------- */
  function saveData() {
    try {
      const data = {};
      getAllFields().forEach((el) => {
        const key = getFieldKey(el);
        if (!key) return;

        if (el.type === "checkbox") {
          data[key] = el.checked;
        } else if (el.type === "radio") {
          if (el.checked) data[key] = el.value;
        } else {
          data[key] = el.value;
        }
      });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch (err) {
      // localStorage can throw in private-browsing / quota-exceeded cases
      console.warn("Pocket Friendly: could not save data", err);
    }
  }

  /* ---------------------------------------------------
     4. LOAD: read localStorage and populate matching
        fields. Handles missing/null/undefined safely.
  --------------------------------------------------- */
  function loadData() {
    let saved;
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return; // nothing saved yet — nothing to do
      saved = JSON.parse(raw);
    } catch (err) {
      console.warn("Pocket Friendly: could not read saved data", err);
      return;
    }

    if (!saved || typeof saved !== "object") return;

    getAllFields().forEach((el) => {
      const key = getFieldKey(el);
      if (!key || !(key in saved)) return;

      const value = saved[key];
      if (value === undefined || value === null) return;

      if (el.type === "checkbox") {
        el.checked = Boolean(value);
      } else if (el.type === "radio") {
        el.checked = el.value === value;
      } else {
        el.value = value;
      }
    });
  }

  /* ---------------------------------------------------
     5. Recalculate dashboard after loading saved data.
        EDIT THIS: call whatever function(s) your app
        already uses to refresh totals/charts/score.
        Common names to check for in your existing code:
        updateDashboard(), calculateTotals(), renderScore()
  --------------------------------------------------- */
  function refreshCalculations() {
    // Try common function names if they exist globally —
    // replace/add the real function name(s) from your app.
    if (typeof window.updateDashboard === "function") window.updateDashboard();
    if (typeof window.calculateTotals === "function") window.calculateTotals();
    if (typeof window.renderScore === "function") window.renderScore();
    if (typeof window.calculateScore === "function") window.calculateScore();

    // Fallback: dispatch a synthetic "input" event on every field
    // so any existing per-field listeners recalculate naturally.
    getAllFields().forEach((el) => {
      el.dispatchEvent(new Event("input", { bubbles: true }));
      el.dispatchEvent(new Event("change", { bubbles: true }));
    });
  }

  /* ---------------------------------------------------
     6. Auto-save wiring: attach listeners to every field
        (lightweight debounce so rapid typing doesn't
        thrash localStorage)
  --------------------------------------------------- */
  let saveTimeout = null;
  function scheduleSave() {
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(saveData, 200);
  }

  function attachAutoSave() {
    getAllFields().forEach((el) => {
      el.addEventListener("input", scheduleSave);
      el.addEventListener("change", scheduleSave);
    });
  }

  /* ---------------------------------------------------
     7. Reset Data button
        Add this button anywhere in your HTML:
        <button id="resetDataBtn" type="button">Reset Data</button>
  --------------------------------------------------- */
  function attachResetButton() {
    const resetBtn = document.getElementById("resetDataBtn");
    if (!resetBtn) return; // safe no-op if button doesn't exist yet

    resetBtn.addEventListener("click", () => {
      const confirmed = window.confirm(
        "This will clear all your saved Pocket Friendly data. Continue?"
      );
      if (!confirmed) return;

      localStorage.removeItem(STORAGE_KEY);

      getAllFields().forEach((el) => {
        if (el.type === "checkbox" || el.type === "radio") {
          el.checked = false;
        } else {
          el.value = "";
        }
      });

      refreshCalculations();
    });
  }

  /* ---------------------------------------------------
     8. Init: load saved data, refresh dashboard,
        then start listening for changes
  --------------------------------------------------- */
  function init() {
    loadData();
    refreshCalculations();
    attachAutoSave();
    attachResetButton();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init(); // DOM already ready
  }
})();
